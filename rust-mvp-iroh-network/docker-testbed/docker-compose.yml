# References: https://docs.docker.com/compose/how-tos/networking/
services:

  peer1:
    build: .
    container_name: peer1
    stdin_open: true
    tty: true
    volumes:
      - ./data/peer1:/app/data:ro # peer1 .parquet files
      - peer1_cache:/app/cache # isolated cache
    networks:
      - p2p-net

  peer2:
    build: .
    container_name: peer2
    stdin_open: true
    tty: true
    volumes:
      - ./data/peer2:/app/data:ro # peer1 .parquet files
      - peer2_cache:/app/cache # isolated cache
    networks:
      - p2p-net

  peer3:
    build: .
    container_name: peer3
    stdin_open: true
    tty: true
    volumes:
      - ./data/peer3:/app/data:ro # peer1 .parquet files
      - peer3_cache:/app/cache # isolated cache
    networks:
      - p2p-net

volumes:
  peer1_cache:
  peer2_cache:
  peer3_cache:

networks:
  p2p-net:
    driver: bridge